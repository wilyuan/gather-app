<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gather — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #f8fafc; color: #1e293b; padding: 32px;
    text-align: center;
  }
  .offline-icon { font-size: 64px; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  p { font-size: 14px; color: #64748b; margin-bottom: 24px; line-height: 1.6; }
  button {
    background: #6366f1; color: white; border: none; padding: 12px 32px;
    border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  button:hover { background: #4f46e5; }
</style>
</head>
<body>
  <div>
    <div class="offline-icon">📡</div>
    <h1>You're offline</h1>
    <p>Gather needs an internet connection to load activities and maps. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
